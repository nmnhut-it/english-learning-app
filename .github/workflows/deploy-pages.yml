name: Deploy Voice Lectures to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'v2/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Create deployment folder
        run: |
          mkdir -p _site
          # Copy voice lecture viewer files
          cp v2/voice-lecture-viewer.html _site/
          cp v2/voice-lecture-viewer-v2.html _site/
          cp v2/voice-lecture-index.html _site/index.html
          # Copy voice lecture content
          cp -r v2/data _site/data
          # Copy unit index pages
          cp -r v2/units _site/units
          # Copy audio files
          cp -r v2/audio _site/audio
          # Copy exercise game files
          [ -d v2/tieu-hoc ] && cp -r v2/tieu-hoc _site/tieu-hoc || true
          # Mirror everything under /v2/ so both /units/ and /v2/units/ work
          mkdir -p _site/v2
          cp -r _site/data _site/v2/data
          cp -r _site/units _site/v2/units
          cp -r _site/audio _site/v2/audio
          [ -d _site/tieu-hoc ] && cp -r _site/tieu-hoc _site/v2/tieu-hoc || true
          cp _site/voice-lecture-viewer.html _site/v2/ 2>/dev/null || true
          cp _site/voice-lecture-viewer-v2.html _site/v2/ 2>/dev/null || true
          cp _site/index.html _site/v2/index.html 2>/dev/null || true
          # Ensure no Jekyll processing
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
